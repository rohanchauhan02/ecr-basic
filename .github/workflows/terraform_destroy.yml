name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - uat
          - prod

      destroy_target:
        description: "Comma-separated targets (all,ecr,eks,vpc,s3,iam)"
        required: true
        default: "all"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-destroy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: iac/terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan Destroy
        shell: bash
        run: |
          TARGETS="${{ github.event.inputs.destroy_target }}"

          if [ "$TARGETS" = "all" ]; then
            echo "Planning destruction of all resources..."

            terraform plan \
              -destroy \
              -var-file=environments/${{ github.event.inputs.environment }}.tfvars

            exit 0
          fi

          ARGS=""
          IFS=',' read -ra ITEMS <<< "$TARGETS"

          for ITEM in "${ITEMS[@]}"; do
            ITEM=$(echo "$ITEM" | xargs)

            case "$ITEM" in
              ecr)
                ARGS="$ARGS -target=module.ecr"
                ;;
              eks)
                ARGS="$ARGS -target=module.eks"
                ;;
              vpc)
                ARGS="$ARGS -target=module.vpc"
                ;;
              s3)
                ARGS="$ARGS -target=module.s3"
                ;;
              iam)
                ARGS="$ARGS -target=module.iam_role"
                ;;
              *)
                echo "Invalid target: $ITEM"
                exit 1
                ;;
            esac
          done

          echo "Running: terraform plan -destroy $ARGS"

          terraform plan \
            -destroy \
            $ARGS \
            -var-file=environments/${{ github.event.inputs.environment }}.tfvars

      - name: Terraform Destroy
        shell: bash
        run: |
          TARGETS="${{ github.event.inputs.destroy_target }}"

          if [ "$TARGETS" = "all" ]; then
            echo "Destroying all infrastructure..."

            terraform destroy \
              -auto-approve \
              -var-file=environments/${{ github.event.inputs.environment }}.tfvars

            exit 0
          fi

          ARGS=""
          IFS=',' read -ra ITEMS <<< "$TARGETS"

          for ITEM in "${ITEMS[@]}"; do
            ITEM=$(echo "$ITEM" | xargs)

            case "$ITEM" in
              ecr)
                ARGS="$ARGS -target=module.ecr"
                ;;
              eks)
                ARGS="$ARGS -target=module.eks"
                ;;
              vpc)
                ARGS="$ARGS -target=module.vpc"
                ;;
              s3)
                ARGS="$ARGS -target=module.s3"
                ;;
              iam)
                ARGS="$ARGS -target=module.iam_role"
                ;;
              *)
                echo "Invalid target: $ITEM"
                exit 1
                ;;
            esac
          done

          echo "Destroying selected resources..."

          terraform destroy \
            -auto-approve \
            $ARGS \
            -var-file=environments/${{ github.event.inputs.environment }}.tfvars

      - name: Terraform Outputs
        if: success()
        run: terraform output || true
