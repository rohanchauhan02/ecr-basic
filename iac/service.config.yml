config:
  environment:
    dev:
      namespace: go-app-dev
      replicaCount: 2
      image:
        repository: ""
        tag: latest
        pullPolicy: Always
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "500m"
          memory: "1Gi"

      service:
        type: ClusterIP
        port: 8080
      ingress:
        enabled: true
        className: alb
        host: api-dev.example.com
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 5
        targetCPUUtilizationPercentage: 70
      secretsWildcard: /go-app/dev
      datadog:
        enabled: false
      labels:
        app: go-app
        team: backend

